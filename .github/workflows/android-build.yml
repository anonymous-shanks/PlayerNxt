name: Android Build APK

on:
  workflow_dispatch: # Allows you to manually trigger the build from GitHub Actions tab
  push:
    branches:
      - '**' # Triggers on any branch push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Unsigned Release APKs
        # Running assembleRelease without signing configs creates unsigned, non-debuggable stable APKs
        run: ./gradlew assembleRelease

      - name: Upload Latest Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: JustPlayer-Latest-Universal
          path: app/build/outputs/apk/latestUniversal/release/*.apk

      - name: Upload Legacy Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: JustPlayer-Legacy-Universal
          path: app/build/outputs/apk/legacyUniversal/release/*.apk

      - name: Upload Latest Amazon APK
        uses: actions/upload-artifact@v4
        with:
          name: JustPlayer-Latest-Amazon
          path: app/build/outputs/apk/latestAmazon/release/*.apk

      - name: Upload Latest Accrescent APK
        uses: actions/upload-artifact@v4
        with:
          name: JustPlayer-Latest-Accrescent
          path: app/build/outputs/apk/latestAccrescent/release/*.apk